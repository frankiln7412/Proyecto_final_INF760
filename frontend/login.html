<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Inventario y Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="login-body">
    <div class="container-fluid h-100">
      <div class="row h-100 g-0">
        <div class="col-lg-7 d-none d-lg-flex align-items-center justify-content-center login-hero">
          <div class="text-center text-white px-5">
            <h1 class="display-5 fw-bold mb-3">Sistema de Inventario y Ventas</h1>
            <p class="lead">Control total de productos, stock, ventas y alertas desde una sola plataforma.</p>
          </div>
        </div>
        <div class="col-lg-5 d-flex align-items-center justify-content-center bg-white">
          <div class="login-card shadow">
            <div class="text-center mb-4">
              <h2 class="fw-bold">Iniciar sesión</h2>
              <p class="text-muted">Accede al panel administrativo</p>
            </div>
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" id="correo" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" required />
              </div>
              <button class="btn btn-primary w-100 py-2">Entrar</button>
            </form>
            <div id="loginAlert" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/auth.js"></script>
  </body>
</html>
