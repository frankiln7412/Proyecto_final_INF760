<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script>
      (function() {
        var theme = localStorage.getItem('inventario_theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'theme-change') {
          document.documentElement.setAttribute('data-theme', e.data.theme);
        }
      });
    </script>
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Gestión de Productos</h2>
          <p class="text-muted mb-0">Administra los productos que se venden, como papas y otros artículos</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal"><i class="bi bi-plus-circle"></i> Nuevo producto</button>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <input id="searchInput" class="form-control" placeholder="Buscar producto..." />
        </div>
      </div>

      <div class="card table-card p-3">
        <div class="table-responsive">
          <table class="table align-middle table-hover">
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th class="text-end">Precio</th>
                <th class="text-end">Stock</th>
                <th class="text-end">Stock mín.</th>
                <th class="text-center">Acciones</th>
              </tr>
            </thead>
            <tbody id="productsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Producto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="productForm">
              <input type="hidden" id="productId" />
              <div class="mb-3"><label class="form-label">Nombre</label><input id="productNombre" class="form-control" placeholder="Nombre del producto" required /></div>
              <div class="mb-3"><label class="form-label">Descripción</label><textarea id="productDescripcion" class="form-control" placeholder="Descripción del producto"></textarea></div>
              <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label">Precio por unidad</label><input id="productPrecio" type="number" step="0.01" class="form-control" required /></div>
                <div class="col-md-6 mb-3"><label class="form-label">Stock inicial</label><input id="productStock" type="number" class="form-control" required /></div>
              </div>
              <div class="mb-3"><label class="form-label">Stock mínimo</label><input id="productStockMinimo" type="number" class="form-control" required /></div>
              <div class="mb-3">
                <label class="form-label">Imagen del producto</label>
                <div id="productImagePreview" class="mb-2 text-center d-none">
                  <img id="productImagePreviewImg" src="" alt="Vista previa" class="img-thumbnail" style="max-height:150px" />
                  <button type="button" class="btn btn-sm btn-outline-danger mt-1" onclick="eliminarImagenProducto()"><i class="bi bi-trash"></i> Eliminar imagen</button>
                </div>
                <input id="productImagenInput" type="file" class="form-control" accept=".jpg,.jpeg,.png,.webp" />
              </div>
              <button class="btn btn-primary w-100">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Modal Eliminar Producto ===== -->
    <div class="modal fade" id="deleteProductModal" tabindex="-1">
      <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-semibold"><i class="bi bi-exclamation-triangle text-danger me-1"></i> Eliminar producto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p class="mb-1" id="deleteProductMsg">¿Estás seguro de eliminar este producto?</p>
            <div class="small text-muted" id="deleteProductWarning"></div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDeleteProduct()"><i class="bi bi-trash me-1"></i> Eliminar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      let products = [];
      let modal;
      let productoEditandoId = null;

      function mostrarPreviewImagen(src) {
        const preview = document.getElementById('productImagePreview');
        const img = document.getElementById('productImagePreviewImg');
        if (src) {
          preview.classList.remove('d-none');
          img.src = src;
        } else {
          preview.classList.add('d-none');
          img.src = '';
        }
      }

      function renderProducts(filtered = products) {
        const tbody = document.getElementById('productsTable');
        tbody.innerHTML = '';
        if (!filtered.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No hay productos</td></tr>';
          return;
        }

        filtered.forEach((product) => {
          const imgSrc = product.imagen ? product.imagen : '../assets/img/product-placeholder.svg';
          tbody.innerHTML += `
            <tr>
              <td class="text-center"><img src="${imgSrc}" alt="${product.nombre}" style="width:50px;height:50px;object-fit:cover;border-radius:8px" onerror="this.src='../assets/img/product-placeholder.svg'" /></td>
              <td class="fw-medium">${product.nombre}</td>
              <td class="text-muted">${product.descripcion || '-'}</td>
              <td class="text-end display-money-sm">$${Number(product.precio).toFixed(2)}</td>
              <td class="text-end">${product.stock}</td>
              <td class="text-end">${product.stock_minimo}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-primary me-1" onclick="editProduct(${product.id})" title="Editar"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="showDeleteModal(${product.id})" title="Eliminar"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          `;
        });
      }

      async function loadProducts() {
        const data = await apiRequest('/api/products');
        products = data;
        renderProducts(products);
      }

      async function saveProduct(event) {
        event.preventDefault();
        const id = document.getElementById('productId').value;
        const payload = {
          nombre: document.getElementById('productNombre').value,
          descripcion: document.getElementById('productDescripcion').value,
          precio: Number(document.getElementById('productPrecio').value),
          stock: Number(document.getElementById('productStock').value),
          stock_minimo: Number(document.getElementById('productStockMinimo').value),
        };

        try {
          var result;
          if (id) {
            result = await apiRequest(`/api/products/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            showToast('Producto actualizado', 'success');
          } else {
            result = await apiRequest('/api/products', { method: 'POST', body: JSON.stringify(payload) });
            showToast('Producto creado', 'success');
          }

          var newId = id || result.product.id;
          var fileInput = document.getElementById('productImagenInput');
          if (fileInput.files.length > 0) {
            var formData = new FormData();
            formData.append('imagen', fileInput.files[0]);
            await apiUpload('/api/products/' + newId + '/imagen', formData);
            showToast('Imagen subida correctamente', 'success');
          }

          bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
          document.getElementById('productForm').reset();
          mostrarPreviewImagen(null);
          productoEditandoId = null;
          loadProducts();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      var deleteProductId = null;

      function showDeleteModal(id) {
        deleteProductId = id;
        var product = products.find(function(p) { return p.id === id; });
        var name = product ? product.nombre : 'este producto';
        document.getElementById('deleteProductMsg').textContent = '¿Estás seguro de eliminar "' + name + '"?';
        document.getElementById('deleteProductWarning').innerHTML = '<i class="bi bi-info-circle me-1"></i> Esta acci\u00f3n no se puede deshacer.';
        new bootstrap.Modal(document.getElementById('deleteProductModal')).show();
      }

      async function confirmDeleteProduct() {
        if (!deleteProductId) return;
        var btn = document.getElementById('confirmDeleteBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Eliminando...';
        try {
          await apiRequest('/api/products/' + deleteProductId, { method: 'DELETE' });
          bootstrap.Modal.getInstance(document.getElementById('deleteProductModal')).hide();
          showToast('Producto eliminado correctamente', 'success');
          deleteProductId = null;
          loadProducts();
        } catch (error) {
          showToast(error.message, 'danger');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-trash me-1"></i> Eliminar';
        }
      }

      async function eliminarImagenProducto() {
        var id = document.getElementById('productId').value;
        if (!id) return;
        if (!confirm('¿Eliminar la imagen del producto?')) return;
        try {
          await apiRequest('/api/products/' + id + '/imagen', { method: 'DELETE' });
          mostrarPreviewImagen(null);
          document.getElementById('productImagenInput').value = '';
          showToast('Imagen eliminada', 'success');
          loadProducts();
        } catch (e) {
          showToast(e.message, 'danger');
        }
      }

      function editProduct(id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;
        productoEditandoId = product.id;
        document.getElementById('productId').value = product.id;
        document.getElementById('productNombre').value = product.nombre;
        document.getElementById('productDescripcion').value = product.descripcion || '';
        document.getElementById('productPrecio').value = product.precio;
        document.getElementById('productStock').value = product.stock;
        document.getElementById('productStockMinimo').value = product.stock_minimo;
        document.getElementById('productImagenInput').value = '';
        if (product.imagen) {
          mostrarPreviewImagen(product.imagen);
        } else {
          mostrarPreviewImagen(null);
        }
        new bootstrap.Modal(document.getElementById('productModal')).show();
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (!protectPage()) return;
        modal = new bootstrap.Modal(document.getElementById('productModal'));
        document.getElementById('productForm').addEventListener('submit', saveProduct);
        document.getElementById('searchInput').addEventListener('input', (event) => {
          const term = event.target.value.toLowerCase();
          renderProducts(products.filter((p) => p.nombre.toLowerCase().includes(term)));
        });
        await loadProducts();
      });
    </script>
  </body>
</html>
