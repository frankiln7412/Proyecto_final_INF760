<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script>
      (function() {
        var theme = localStorage.getItem('inventario_theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'theme-change') {
          document.documentElement.setAttribute('data-theme', e.data.theme);
        }
      });
    </script>
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Dashboard</h2>
          <p class="text-muted mb-0">Resumen ejecutivo de tu negocio</p>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="d-flex justify-content-center align-items-center py-5">
        <div class="spinner-border text-primary" role="status" style="color: var(--primary) !important;">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </div>

      <!-- Content -->
      <div id="dashboardContent" class="d-none">
        <div class="row g-4 mb-4" id="kpiRow">
          <div class="col-md-3 col-6">
            <div class="card card-premium card-stat">
              <div class="d-flex align-items-start justify-content-between">
                <div>
                  <p class="kpi-label">Productos</p>
                  <div class="kpi-value" id="totalProductos">—</div>
                </div>
                <div class="kpi-icon kpi-icon-bg-primary"><i class="bi bi-box2"></i></div>
              </div>
            </div>
          </div>
          <div class="col-md-3 col-6">
            <div class="card card-premium card-stat">
              <div class="d-flex align-items-start justify-content-between">
                <div>
                  <p class="kpi-label">Ventas totales</p>
                  <div class="kpi-value" id="totalVentas">$0</div>
                </div>
                <div class="kpi-icon kpi-icon-bg-success"><i class="bi bi-cart3"></i></div>
              </div>
            </div>
          </div>
          <div class="col-md-3 col-6">
            <div class="card card-premium card-stat">
              <div class="d-flex align-items-start justify-content-between">
                <div>
                  <p class="kpi-label">Ventas hoy</p>
                  <div class="kpi-value" id="ventasHoy">$0</div>
                </div>
                <div class="kpi-icon kpi-icon-bg-secondary"><i class="bi bi-calendar-check"></i></div>
              </div>
            </div>
          </div>
          <div class="col-md-3 col-6">
            <div class="card card-premium card-stat">
              <div class="d-flex align-items-start justify-content-between">
                <div>
                  <p class="kpi-label">Alertas activas</p>
                  <div class="kpi-value" id="alertasActivas">0</div>
                </div>
                <div class="kpi-icon kpi-icon-bg-warning"><i class="bi bi-exclamation-triangle"></i></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card table-card p-3">
              <h5 class="fw-semibold mb-3">Productos con stock bajo</h5>
              <div class="table-responsive">
                <table class="table align-middle" id="stockLowTable">
                  <thead>
                    <tr>
                      <th>Producto</th>
                      <th class="text-end">Stock</th>
                      <th class="text-end">Stock mín.</th>
                      <th class="text-center">Estado</th>
                    </tr>
                  </thead>
                  <tbody id="stockLowBody"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card table-card p-3">
              <h5 class="fw-semibold mb-3">Resumen rápido</h5>
              <div id="summaryBody">
                <ul id="summaryList" class="list-group list-group-flush"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      async function loadDashboard() {
        try {
          const data = await apiRequest('/api/sales/dashboard');

          // Stock Pulse en el sidebar (parent)
          try { if (window.parent && window.parent.updateStockPulse) window.parent.updateStockPulse(data); } catch (e) {}

          document.getElementById('totalProductos').textContent = data.total_productos ?? '—';
          document.getElementById('totalVentas').textContent = '$' + Number(data.total_ventas).toFixed(2);
          document.getElementById('ventasHoy').textContent = '$' + Number(data.ventas_hoy).toFixed(2);
          document.getElementById('alertasActivas').textContent = data.alertas_activas ?? 0;

          const body = document.getElementById('stockLowBody');
          body.innerHTML = '';

          if (!data.productos_stock_bajo || data.productos_stock_bajo.length === 0) {
            body.innerHTML = `
              <tr>
                <td colspan="4">
                  <div class="empty-state">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                      <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <div class="empty-state-title">Stock saludable</div>
                    <div class="empty-state-desc">No hay productos con stock bajo en este momento.</div>
                  </div>
                </td>
              </tr>`;
          } else {
            data.productos_stock_bajo.forEach((product) => {
              const ratio = product.stock / product.stock_minimo;
              const statusClass = ratio <= 0.5 ? 'critical' : 'warning';
              const badgeClass = ratio <= 0.5 ? 'badge-critical' : 'badge-warning';
              const label = ratio <= 0.5 ? 'Crítico' : 'Bajo';
              body.innerHTML +=
                `<tr data-status="${statusClass}">
                  <td class="fw-medium">${product.nombre}</td>
                  <td class="text-end">${product.stock}</td>
                  <td class="text-end">${product.stock_minimo}</td>
                  <td class="text-center"><span class="badge ${badgeClass}">${label}</span></td>
                </tr>`;
            });
          }

          document.getElementById('summaryList').innerHTML =
            '<li class="list-group-item d-flex justify-content-between px-0"><span>Total productos</span><strong>' + (data.total_productos ?? 0) + '</strong></li>' +
            '<li class="list-group-item d-flex justify-content-between px-0"><span>Ventas totales</span><strong class="display-money-sm">$' + Number(data.total_ventas).toFixed(2) + '</strong></li>' +
            '<li class="list-group-item d-flex justify-content-between px-0"><span>Ventas hoy</span><strong class="display-money-sm">$' + Number(data.ventas_hoy).toFixed(2) + '</strong></li>' +
            '<li class="list-group-item d-flex justify-content-between px-0"><span>Alertas activas</span><strong>' + (data.alertas_activas ?? 0) + '</strong></li>';

        } catch (error) {
          document.getElementById('dashboardContent').innerHTML =
            '<div class="empty-state"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="empty-state-title">Error al cargar</div><div class="empty-state-desc">' + error.message + '</div></div>';
        } finally {
          document.getElementById('loading').classList.add('d-none');
          document.getElementById('dashboardContent').classList.remove('d-none');
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        if (!protectPage()) return;
        loadDashboard();
      });
    </script>
  </body>
</html>
