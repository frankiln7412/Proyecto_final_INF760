<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Dashboard</h2>
          <p class="text-muted mb-0">Resumen ejecutivo del negocio</p>
        </div>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-md-12">
          <div class="card table-card p-4">
            <h4 class="fw-bold mb-1">Panel de control profesional</h4>
            <p class="text-muted mb-0">Ventas, inventario, entradas, salidas y costos en una sola vista.</p>
          </div>
        </div>
      </div>

      <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>

      <div id="dashboardContent" class="d-none">
        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="card card-stat p-3">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <p class="text-muted mb-1">Productos</p>
                  <h3 id="totalProductos">0</h3>
                </div>
                <div class="kpi-icon bg-primary"><i class="bi bi-box2"></i></div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card card-stat p-3">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <p class="text-muted mb-1">Ventas</p>
                  <h3 id="totalVentas">0</h3>
                </div>
                <div class="kpi-icon bg-success"><i class="bi bi-cart3"></i></div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card card-stat p-3">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <p class="text-muted mb-1">Ganancias</p>
                  <h3 id="totalGanancias">0</h3>
                </div>
                <div class="kpi-icon bg-warning"><i class="bi bi-cash-stack"></i></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card table-card p-3">
              <h5 class="fw-semibold mb-3">Productos con stock bajo</h5>
              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr><th>Producto</th><th>Stock</th><th>Stock mínimo</th><th>Estado</th></tr>
                  </thead>
                  <tbody id="stockLowTable"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card table-card p-3">
              <h5 class="fw-semibold mb-3">Resumen rápido</h5>
              <ul id="summaryList" class="list-group list-group-flush"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      async function loadDashboard() {
        try {
          const data = await apiRequest('/api/sales/dashboard');
          document.getElementById('totalProductos').textContent = '—';
          document.getElementById('totalVentas').textContent = `$${Number(data.total_ventas).toFixed(2)}`;
          document.getElementById('totalGanancias').textContent = `$${Number(data.total_ganancias).toFixed(2)}`;

          const products = await apiRequest('/api/products');
          document.getElementById('totalProductos').textContent = products.length;

          const tableBody = document.getElementById('stockLowTable');
          tableBody.innerHTML = '';
          if (data.productos_stock_bajo.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-muted text-center">No hay productos con stock bajo</td></tr>';
          } else {
            data.productos_stock_bajo.forEach((product) => {
              tableBody.innerHTML += `<tr><td>${product.nombre}</td><td>${product.stock}</td><td>${product.stock_minimo}</td><td><span class="badge badge-critical">Crítico</span></td></tr>`;
            });
          }

          const summaryList = document.getElementById('summaryList');
          summaryList.innerHTML = `
            <li class="list-group-item"><strong>Total de productos:</strong> ${products.length}</li>
            <li class="list-group-item"><strong>Ventas registradas:</strong> ${Number(data.total_ventas).toFixed(2)}</li>
            <li class="list-group-item"><strong>Ganancias:</strong> $${Number(data.total_ganancias).toFixed(2)}</li>
          `;
        } catch (error) {
          document.getElementById('dashboardContent').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
        } finally {
          document.getElementById('loading').classList.add('d-none');
          document.getElementById('dashboardContent').classList.remove('d-none');
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        if (!protectPage()) return;
        loadDashboard();
      });
    </script>
  </body>
</html>
