<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script>
      (function() {
        var theme = localStorage.getItem('inventario_theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'theme-change') {
          document.documentElement.setAttribute('data-theme', e.data.theme);
        }
      });
    </script>
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Proveedores</h2>
          <p class="text-muted mb-0">Registro de proveedores para reposición de stock</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#proveedorModal"><i class="bi bi-plus-circle"></i> Nuevo proveedor</button>
      </div>

      <div class="card table-card p-3">
        <div class="table-responsive">
          <table class="table align-middle table-hover">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Contacto</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Dirección</th>
                <th class="text-center">Acciones</th>
              </tr>
            </thead>
            <tbody id="proveedoresTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="proveedorModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Proveedor</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <form id="proveedorForm">
              <input type="hidden" id="proveedorId" />
              <div class="mb-3"><label class="form-label">Nombre</label><input id="proveedorNombre" class="form-control" required /></div>
              <div class="mb-3"><label class="form-label">Contacto</label><input id="proveedorContacto" class="form-control" /></div>
              <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label">Teléfono</label><input id="proveedorTelefono" class="form-control" /></div>
                <div class="col-md-6 mb-3"><label class="form-label">Email</label><input id="proveedorEmail" type="email" class="form-control" /></div>
              </div>
              <div class="mb-3"><label class="form-label">Dirección</label><textarea id="proveedorDireccion" class="form-control" rows="2"></textarea></div>
              <button class="btn btn-primary w-100">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      let proveedores = [];

      function renderProveedores() {
        const tbody = document.getElementById('proveedoresTable');
        tbody.innerHTML = '';
        if (!proveedores.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay proveedores registrados</td></tr>';
          return;
        }
        proveedores.forEach((p) => {
          tbody.innerHTML += `
            <tr>
              <td class="fw-medium">${p.nombre}</td>
              <td>${p.contacto || '-'}</td>
              <td>${p.telefono || '-'}</td>
              <td>${p.email || '-'}</td>
              <td class="text-muted small">${p.direccion || '-'}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-primary me-1" onclick="editProveedor(${p.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteProveedor(${p.id})"><i class="bi bi-trash"></i></button>
              </td>
            </tr>`;
        });
      }

      async function loadProveedores() {
        try {
          proveedores = await apiRequest('/api/proveedores');
          renderProveedores();
        } catch (e) {
          showToast(e.message, 'danger');
        }
      }

      async function saveProveedor(event) {
        event.preventDefault();
        const id = document.getElementById('proveedorId').value;
        const payload = {
          nombre: document.getElementById('proveedorNombre').value,
          contacto: document.getElementById('proveedorContacto').value,
          telefono: document.getElementById('proveedorTelefono').value,
          email: document.getElementById('proveedorEmail').value,
          direccion: document.getElementById('proveedorDireccion').value,
        };
        try {
          if (id) {
            await apiRequest(`/api/proveedores/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            showToast('Proveedor actualizado', 'success');
          } else {
            await apiRequest('/api/proveedores', { method: 'POST', body: JSON.stringify(payload) });
            showToast('Proveedor creado', 'success');
          }
          bootstrap.Modal.getInstance(document.getElementById('proveedorModal')).hide();
          document.getElementById('proveedorForm').reset();
          loadProveedores();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      function editProveedor(id) {
        const p = proveedores.find((x) => x.id === id);
        if (!p) return;
        document.getElementById('proveedorId').value = p.id;
        document.getElementById('proveedorNombre').value = p.nombre;
        document.getElementById('proveedorContacto').value = p.contacto || '';
        document.getElementById('proveedorTelefono').value = p.telefono || '';
        document.getElementById('proveedorEmail').value = p.email || '';
        document.getElementById('proveedorDireccion').value = p.direccion || '';
        new bootstrap.Modal(document.getElementById('proveedorModal')).show();
      }

      async function deleteProveedor(id) {
        if (!confirm('¿Eliminar proveedor?')) return;
        try {
          await apiRequest(`/api/proveedores/${id}`, { method: 'DELETE' });
          showToast('Proveedor eliminado', 'success');
          loadProveedores();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (!protectPage()) return;
        document.getElementById('proveedorForm').addEventListener('submit', saveProveedor);
        await loadProveedores();
      });
    </script>
  </body>
</html>
