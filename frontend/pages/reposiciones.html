<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reposiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Reposiciones</h2>
          <p class="text-muted mb-0">Historial de reposición de stock</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#repositionModal"><i class="bi bi-plus-circle"></i> Nueva reposición</button>
      </div>
      <div class="table-responsive">
        <table class="table align-middle table-hover">
          <thead><tr><th>Producto</th><th>Cantidad</th><th>Fecha</th><th>Acciones</th></tr></thead>
          <tbody id="repositionsTable"></tbody>
        </table>
      </div>
    </div>

    <div class="modal fade" id="repositionModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Reposición</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <form id="repositionForm">
              <input type="hidden" id="repositionId" />
              <div class="mb-3"><label class="form-label">Producto</label><select id="repositionProducto" class="form-select" required></select></div>
              <div class="mb-3"><label class="form-label">Cantidad</label><input id="repositionCantidad" type="number" class="form-control" required /></div>
              <button class="btn btn-primary w-100">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      let repositions = [];
      let products = [];

      async function loadProductsForSelect() {
        products = await apiRequest('/api/products');
        const select = document.getElementById('repositionProducto');
        select.innerHTML = '<option value="">Seleccione</option>';
        products.forEach((product) => {
          select.innerHTML += `<option value="${product.id}">${product.nombre}</option>`;
        });
      }

      function renderRepositions() {
        const tbody = document.getElementById('repositionsTable');
        tbody.innerHTML = '';
        if (!repositions.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay reposiciones</td></tr>';
          return;
        }
        repositions.forEach((reposition) => {
          tbody.innerHTML += `
            <tr>
              <td>${reposition.producto_nombre}</td>
              <td>${reposition.cantidad}</td>
              <td>${new Date(reposition.fecha).toLocaleString()}</td>
              <td>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteReposition(${reposition.id})"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          `;
        });
      }

      async function loadRepositions() {
        repositions = await apiRequest('/api/repositions');
        renderRepositions();
      }

      async function saveReposition(event) {
        event.preventDefault();
        const payload = {
          producto_id: Number(document.getElementById('repositionProducto').value),
          cantidad: Number(document.getElementById('repositionCantidad').value),
        };
        try {
          await apiRequest('/api/repositions', { method: 'POST', body: JSON.stringify(payload) });
          bootstrap.Modal.getInstance(document.getElementById('repositionModal')).hide();
          document.getElementById('repositionForm').reset();
          loadRepositions();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      async function deleteReposition(id) {
        if (!confirm('¿Eliminar reposición?')) return;
        try {
          await apiRequest(`/api/repositions/${id}`, { method: 'DELETE' });
          loadRepositions();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (!protectPage()) return;
        document.getElementById('repositionForm').addEventListener('submit', saveReposition);
        await loadProductsForSelect();
        await loadRepositions();
      });
    </script>
  </body>
</html>
