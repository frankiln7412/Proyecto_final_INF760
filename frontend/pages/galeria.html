<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script>
      (function() {
        var theme = localStorage.getItem('inventario_theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'theme-change') {
          document.documentElement.setAttribute('data-theme', e.data.theme);
        }
      });
    </script>
    <style>
      /* ===== Gallery Reset & Base ===== */
      .gallery-body {
        background: var(--bg);
        min-height: 100vh;
        overflow-x: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        padding: 0 !important;
      }

      /* ===== Hero Carousel ===== */
      .gallery-hero {
        position: relative;
        width: 100%;
        height: 70vh;
        min-height: 420px;
        max-height: 640px;
        overflow: hidden;
        background: #0B1120;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        box-shadow: var(--shadow-xl);
      }
      .hero-track {
        display: flex;
        width: 100%;
        height: 100%;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .hero-slide {
        min-width: 100%;
        height: 100%;
        position: relative;
        flex-shrink: 0;
      }
      .hero-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .hero-slide::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(11,17,32,0.85) 0%, rgba(11,17,32,0.3) 50%, rgba(11,17,32,0.1) 100%);
        pointer-events: none;
      }
      .hero-content {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 3rem 2.5rem;
        z-index: 2;
        transform: translateY(0);
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .hero-badge {
        display: inline-block;
        padding: 0.25rem 1rem;
        border-radius: var(--radius-full);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.75rem;
        font-family: 'Sora', sans-serif;
      }
      .hero-badge.disponible {
        background: rgba(22, 163, 74, 0.9);
        color: #fff;
        box-shadow: 0 0 20px rgba(22, 163, 74, 0.3);
      }
      .hero-badge.agotado {
        background: rgba(220, 38, 38, 0.9);
        color: #fff;
        box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
      }
      .hero-content h2 {
        font-family: 'Sora', sans-serif;
        font-size: 2.5rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 0.5rem;
        text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        line-height: 1.1;
      }
      .hero-price {
        font-family: 'Sora', sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: #F5B800;
        display: block;
        text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      }
      .hero-stock-info {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.6);
        margin-top: 0.25rem;
      }

      /* ===== Hero Controls ===== */
      .hero-arrows {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        display: flex;
        justify-content: space-between;
        padding: 0 1rem;
        z-index: 3;
        pointer-events: none;
      }
      .hero-arrow {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1.3rem;
        pointer-events: auto;
      }
      .hero-arrow:hover {
        background: rgba(255,255,255,0.25);
        transform: scale(1.1);
      }
      .hero-dots {
        position: absolute;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.5rem;
        z-index: 3;
      }
      .hero-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        padding: 0;
      }
      .hero-dot.active {
        background: #fff;
        box-shadow: 0 0 12px rgba(255,255,255,0.4);
        width: 28px;
        border-radius: 5px;
      }

      /* ===== Gallery Header ===== */
      .gallery-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 2rem 0.5rem;
        max-width: 1400px;
        margin: 0 auto;
      }
      .gallery-header h1 {
        font-family: 'Sora', sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--text);
        margin: 0;
      }
      .gallery-header h1 i {
        color: var(--primary);
        margin-right: 0.5rem;
      }
      .gallery-header .live-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.78rem;
        color: var(--text-muted);
      }
      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        animation: livePulse 2s infinite;
      }
      @keyframes livePulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* ===== Product Grid ===== */
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.5rem;
        padding: 1.5rem 2rem 3rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* ===== Gallery Card ===== */
      .gallery-card {
        position: relative;
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--surface);
        box-shadow: var(--shadow-md);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: default;
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      .gallery-card.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .gallery-card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      }
      .gallery-card.agotado {
        opacity: 0.7;
      }
      .gallery-card.agotado:hover {
        opacity: 0.85;
      }
      .gallery-card-img-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16/10;
        overflow: hidden;
        background: var(--bg);
      }
      .gallery-card-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        display: block;
      }
      .gallery-card:hover .gallery-card-img-wrap img {
        transform: scale(1.08);
      }
      .gallery-card.agotado .gallery-card-img-wrap img {
        filter: grayscale(0.6) brightness(0.5);
      }
      .gallery-card-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: var(--danger);
        color: #fff;
        padding: 0.25rem 1rem;
        border-radius: var(--radius-full);
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        box-shadow: 0 4px 15px rgba(220,38,38,0.4);
        z-index: 2;
        font-family: 'Sora', sans-serif;
      }
      .gallery-card-body {
        padding: 1rem 1.1rem 1.1rem;
      }
      .gallery-card-body h3 {
        font-family: 'Sora', sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.3rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .gallery-card-body .gallery-card-price {
        font-family: 'Sora', sans-serif;
        font-size: 1.15rem;
        font-weight: 800;
        color: var(--primary);
      }
      .gallery-card-body .gallery-card-status {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 0.2rem;
        display: block;
      }
      .gallery-card-body .gallery-card-status.disponible { color: var(--success); }
      .gallery-card-body .gallery-card-status.agotado { color: var(--danger); }

      /* ===== Empty State ===== */
      .gallery-empty {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-muted);
      }
      .gallery-empty i {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      /* ===== Animaciones por lote (stagger) ===== */
      .gallery-card:nth-child(1) { transition-delay: 0.0s; }
      .gallery-card:nth-child(2) { transition-delay: 0.05s; }
      .gallery-card:nth-child(3) { transition-delay: 0.1s; }
      .gallery-card:nth-child(4) { transition-delay: 0.15s; }
      .gallery-card:nth-child(5) { transition-delay: 0.2s; }
      .gallery-card:nth-child(6) { transition-delay: 0.25s; }
      .gallery-card:nth-child(7) { transition-delay: 0.3s; }
      .gallery-card:nth-child(8) { transition-delay: 0.35s; }
      .gallery-card:nth-child(9) { transition-delay: 0.4s; }
      .gallery-card:nth-child(10) { transition-delay: 0.45s; }
      .gallery-card:nth-child(11) { transition-delay: 0.5s; }
      .gallery-card:nth-child(12) { transition-delay: 0.55s; }
      .gallery-card:nth-child(13) { transition-delay: 0.6s; }
      .gallery-card:nth-child(14) { transition-delay: 0.65s; }
      .gallery-card:nth-child(15) { transition-delay: 0.7s; }
      .gallery-card:nth-child(16) { transition-delay: 0.75s; }
      .gallery-card:nth-child(17) { transition-delay: 0.8s; }
      .gallery-card:nth-child(18) { transition-delay: 0.85s; }
      .gallery-card:nth-child(19) { transition-delay: 0.9s; }
      .gallery-card:nth-child(20) { transition-delay: 0.95s; }

      /* ===== Mensaje de actualización ===== */
      .gallery-toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--surface);
        border-radius: var(--radius-md);
        padding: 0.75rem 1.25rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
        font-size: 0.82rem;
        color: var(--text);
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        animation: fadeIn 0.3s ease;
        transition: opacity 0.3s ease;
      }
      .gallery-toast i { color: var(--success); }

      /* ===== Responsive ===== */
      @media (max-width: 768px) {
        .gallery-hero {
          height: 50vh;
          min-height: 280px;
          border-radius: 0;
        }
        .hero-content {
          padding: 1.5rem 1.25rem;
        }
        .hero-content h2 {
          font-size: 1.5rem;
        }
        .hero-price {
          font-size: 1.2rem;
        }
        .hero-arrow {
          width: 36px;
          height: 36px;
          font-size: 1rem;
        }
        .gallery-header {
          padding: 1rem 1rem 0.25rem;
          flex-direction: column;
          align-items: flex-start;
          gap: 0.5rem;
        }
        .gallery-header h1 {
          font-size: 1.2rem;
        }
        .gallery-grid {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 0.75rem;
          padding: 0.75rem 1rem 2rem;
        }
        .gallery-card-body {
          padding: 0.6rem 0.75rem;
        }
        .gallery-card-body h3 {
          font-size: 0.8rem;
        }
        .gallery-card-body .gallery-card-price {
          font-size: 0.95rem;
        }
        .gallery-toast {
          bottom: 1rem;
          right: 1rem;
          left: 1rem;
        }
      }

      @media (max-width: 480px) {
        .gallery-hero {
          height: 40vh;
          min-height: 220px;
        }
        .hero-content h2 {
          font-size: 1.2rem;
        }
        .hero-price {
          font-size: 1rem;
        }
        .gallery-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 0.5rem;
          padding: 0.5rem 0.75rem 1.5rem;
        }
        .hero-arrows {
          display: none;
        }
      }

      /* TV / Large screens */
      @media (min-width: 1920px) {
        .gallery-hero {
          max-height: 800px;
        }
        .hero-content h2 {
          font-size: 3.5rem;
        }
        .hero-price {
          font-size: 2.5rem;
        }
        .gallery-grid {
          grid-template-columns: repeat(6, 1fr);
          max-width: 1800px;
        }
      }
    </style>
  </head>
  <body class="gallery-body">
    <!-- ===== Hero Carousel ===== -->
    <div class="gallery-hero" id="galleryHero">
      <div class="hero-track" id="heroTrack">
        <div class="hero-slide placeholder-slide">
          <div style="width:100%;height:100%;display:grid;place-items:center;background:linear-gradient(135deg,#1D4ED8,#0B1120);color:#fff;font-family:'Sora',sans-serif;">
            <div style="text-align:center;">
              <i class="bi bi-box-seam" style="font-size:4rem;opacity:0.5;margin-bottom:1rem;display:block;"></i>
              <h2 style="font-size:2rem;font-weight:700;">Galería de Productos</h2>
              <p style="opacity:0.6;">Cargando productos...</p>
            </div>
          </div>
        </div>
      </div>
      <div class="hero-arrows">
        <button class="hero-arrow" onclick="heroPrev()" aria-label="Anterior"><i class="bi bi-chevron-left"></i></button>
        <button class="hero-arrow" onclick="heroNext()" aria-label="Siguiente"><i class="bi bi-chevron-right"></i></button>
      </div>
      <div class="hero-dots" id="heroDots"></div>
    </div>

    <!-- ===== Header ===== -->
    <div class="gallery-header">
      <h1><i class="bi bi-grid-3x3-gap-fill"></i> Todos los Productos</h1>
      <div class="live-indicator">
        <span class="live-dot"></span>
        <span id="productCountLabel">0 productos</span>
        <span style="opacity:0.4;">·</span>
        <span>Actualización automática</span>
      </div>
    </div>

    <!-- ===== Grid ===== -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- ===== Toast de actualización ===== -->
    <div id="galleryToast" class="gallery-toast" style="display:none;">
      <i class="bi bi-arrow-repeat"></i>
      <span id="galleryToastMsg">Productos actualizados</span>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
      let galleryProducts = [];
      let heroIndex = 0;
      let heroTimer = null;
      let refreshTimer = null;
      let isLoading = false;
      let observer = null;

      /* ===== Cargar productos ===== */
      async function loadGalleryProducts() {
        if (isLoading) return;
        isLoading = true;
        try {
          const data = await apiRequest('/api/products');
          const changed = JSON.stringify(galleryProducts) !== JSON.stringify(data);
          galleryProducts = data || [];
          renderHero();
          renderGrid();
          updateCount();
          if (changed) {
            showToast('Productos actualizados');
          }
        } catch (e) {
          if (!galleryProducts.length) {
            document.getElementById('galleryGrid').innerHTML = '<div class="gallery-empty"><i class="bi bi-box-seam"></i><p>Error al cargar productos</p></div>';
          }
        }
        isLoading = false;
      }

      function updateCount() {
        const label = document.getElementById('productCountLabel');
        if (label) {
          const disponibles = galleryProducts.filter(function(p) { return p.stock > 0; }).length;
          label.textContent = disponibles + '/' + galleryProducts.length + ' productos';
        }
      }

      /* ===== Hero Carousel ===== */
      function renderHero() {
        const track = document.getElementById('heroTrack');
        const dots = document.getElementById('heroDots');
        const items = galleryProducts;
        if (!items.length) {
          track.innerHTML = '<div class="hero-slide"><div style="width:100%;height:100%;display:grid;place-items:center;background:linear-gradient(135deg,#1D4ED8,#0B1120);color:#fff;"><div style="text-align:center;"><i class="bi bi-box-seam" style="font-size:4rem;opacity:0.5;display:block;margin-bottom:1rem;"></i><h2 style="font-size:2rem;">Sin productos</h2></div></div></div>';
          dots.innerHTML = '';
          return;
        }

        let html = '';
        dots.innerHTML = '';
        items.forEach(function(p, i) {
          const imgSrc = p.imagen || '../assets/img/product-placeholder.svg';
          const badgeClass = p.stock > 0 ? 'disponible' : 'agotado';
          const badgeText = p.stock > 0 ? 'Disponible' : 'AGOTADO';
          html += '<div class="hero-slide">'
            + '<img src="' + imgSrc + '" alt="' + p.nombre + '" onerror="this.src=\'../assets/img/product-placeholder.svg\'" />'
            + '<div class="hero-content">'
            + '<span class="hero-badge ' + badgeClass + '">' + badgeText + '</span>'
            + '<h2>' + p.nombre + '</h2>'
            + '<span class="hero-price">Bs. ' + Number(p.precio).toFixed(2) + '</span>'
            + (p.stock > 0 && p.stock <= 5 ? '<span class="hero-stock-info">Stock: ' + p.stock + ' unidades</span>' : '')
            + '</div></div>';
          dots.innerHTML += '<button class="hero-dot' + (i === 0 ? ' active' : '') + '" onclick="heroGoTo(' + i + ')" aria-label="Slide ' + (i+1) + '"></button>';
        });
        track.innerHTML = html;
        if (heroIndex >= items.length) { heroIndex = 0; }
        updateHeroPosition();
        startHeroAutoPlay();
      }

      function updateHeroPosition() {
        const track = document.getElementById('heroTrack');
        if (track) {
          track.style.transform = 'translateX(-' + (heroIndex * 100) + '%)';
        }
        document.querySelectorAll('.hero-dot').forEach(function(dot, i) {
          dot.classList.toggle('active', i === heroIndex);
        });
      }

      function heroNext() {
        const slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        heroIndex = (heroIndex + 1) % slides.length;
        updateHeroPosition();
        restartHeroAutoPlay();
      }

      function heroPrev() {
        const slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        heroIndex = (heroIndex - 1 + slides.length) % slides.length;
        updateHeroPosition();
        restartHeroAutoPlay();
      }

      function heroGoTo(index) {
        heroIndex = index;
        updateHeroPosition();
        restartHeroAutoPlay();
      }

      function startHeroAutoPlay() {
        stopHeroAutoPlay();
        heroTimer = setInterval(heroNext, 5000);
      }

      function stopHeroAutoPlay() {
        if (heroTimer) { clearInterval(heroTimer); heroTimer = null; }
      }

      function restartHeroAutoPlay() {
        stopHeroAutoPlay();
        heroTimer = setInterval(heroNext, 5000);
      }

      /* ===== Grid ===== */
      function renderGrid() {
        const grid = document.getElementById('galleryGrid');
        if (!galleryProducts.length) {
          grid.innerHTML = '<div class="gallery-empty"><i class="bi bi-box-seam"></i><p>No hay productos disponibles</p></div>';
          return;
        }

        let html = '';
        galleryProducts.forEach(function(p) {
          const imgSrc = p.imagen || '../assets/img/product-placeholder.svg';
          const isAgotado = p.stock <= 0;
          html += '<div class="gallery-card' + (isAgotado ? ' agotado' : '') + '" data-id="' + p.id + '">'
            + '<div class="gallery-card-img-wrap">'
            + '<img src="' + imgSrc + '" alt="' + p.nombre + '" loading="lazy" onerror="this.src=\'../assets/img/product-placeholder.svg\'" />'
            + (isAgotado ? '<span class="gallery-card-badge">AGOTADO</span>' : '')
            + '</div>'
            + '<div class="gallery-card-body">'
            + '<h3>' + p.nombre + '</h3>'
            + '<span class="gallery-card-price">Bs. ' + Number(p.precio).toFixed(2) + '</span>'
            + '<span class="gallery-card-status ' + (isAgotado ? 'agotado' : 'disponible') + '">' + (isAgotado ? 'AGOTADO' : 'Disponible') + '</span>'
            + '</div></div>';
        });
        grid.innerHTML = html;
        observeCards();
      }

      /* ===== Intersection Observer for stagger animations ===== */
      function observeCards() {
        if (observer) observer.disconnect();
        observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px 50px 0px' });
        document.querySelectorAll('.gallery-card').forEach(function(card) {
          observer.observe(card);
        });
      }

      /* ===== Toast ===== */
      function showToast(msg) {
        var toast = document.getElementById('galleryToast');
        var msgEl = document.getElementById('galleryToastMsg');
        if (!toast) return;
        msgEl.textContent = msg;
        toast.style.display = 'flex';
        toast.style.opacity = '1';
        clearTimeout(toast._hideTimer);
        toast._hideTimer = setTimeout(function() {
          toast.style.opacity = '0';
          setTimeout(function() { toast.style.display = 'none'; }, 300);
        }, 2500);
      }

      /* ===== Auto-refresh ===== */
      function startAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(loadGalleryProducts, 8000);
      }

      /* ===== Init ===== */
      document.addEventListener('DOMContentLoaded', function() {
        if (!protectPage()) return;
        loadGalleryProducts();
        startAutoRefresh();
      });
    </script>
  </body>
</html>
