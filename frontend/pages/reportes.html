<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Reportes de ventas</h2>
          <p class="text-muted mb-0">Detalle de productos vendidos, cantidades, precio y total por línea</p>
        </div>
      </div>

      <div class="card table-card p-3 mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label">Tipo de reporte</label>
            <select id="reportType" class="form-select">
              <option value="detalle">Detalle</option>
              <option value="diario">Diario</option>
              <option value="mensual">Mensual</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Desde</label>
            <input id="dateFrom" type="date" class="form-control" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Hasta</label>
            <input id="dateTo" type="date" class="form-control" />
          </div>
          <div class="col-md-3">
            <button id="applyFiltersBtn" class="btn btn-primary w-100">Aplicar</button>
          </div>
        </div>
      </div>

      <div class="card table-card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3 no-print">
          <h5 class="fw-semibold mb-0">Resultados</h5>
          <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="bi bi-printer"></i> Imprimir</button>
        </div>
        <div class="table-responsive">
          <table class="table align-middle table-hover">
            <thead>
              <tr id="reportHeaders"></tr>
            </thead>
            <tbody id="reportTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      function setHeaders(type) {
        const headerRow = document.getElementById('reportHeaders');
        if (type === 'diario' || type === 'mensual') {
          headerRow.innerHTML = '<th>Período</th><th class="text-end">Ventas</th><th class="text-end">Total</th>';
          return;
        }
        headerRow.innerHTML = '<th>Fecha</th><th>Producto</th><th class="text-end">Cantidad</th><th class="text-end">Precio unit.</th><th class="text-end">Total producto</th><th class="text-end">Total venta</th>';
      }

      async function loadReport() {
        try {
          const type = document.getElementById('reportType').value;
          const from = document.getElementById('dateFrom').value;
          const to = document.getElementById('dateTo').value;
          const params = new URLSearchParams({ tipo: type });
          if (from) params.append('desde', `${from}T00:00:00`);
          if (to) params.append('hasta', `${to}T23:59:59`);

          const rows = await apiRequest(`/api/sales/reportes?${params.toString()}`);
          const tbody = document.getElementById('reportTable');
          tbody.innerHTML = '';
          setHeaders(type);

          if (!rows.length) {
            const colspan = type === 'detalle' ? 6 : 3;
            tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted">No hay resultados para este rango</td></tr>`;
            return;
          }

          if (type === 'diario' || type === 'mensual') {
            rows.forEach((row) => {
              tbody.innerHTML += `
                <tr>
                  <td class="fw-medium">${row.fecha}</td>
                  <td class="text-end">${row.ventas}</td>
                  <td class="text-end display-money-sm">$${Number(row.total).toFixed(2)}</td>
                </tr>
              `;
            });
            return;
          }

          rows.forEach((row) => {
            tbody.innerHTML += `
              <tr>
                <td class="text-nowrap small">${new Date(row.fecha).toLocaleString()}</td>
                <td class="fw-medium">${row.producto}</td>
                <td class="text-end">${row.cantidad}</td>
                <td class="text-end">$${Number(row.precio_unitario).toFixed(2)}</td>
                <td class="text-end display-money-sm">$${Number(row.total_producto).toFixed(2)}</td>
                <td class="text-end display-money-sm">$${Number(row.total_venta).toFixed(2)}</td>
              </tr>
            `;
          });
        } catch (error) {
          document.getElementById('reportTable').innerHTML = `<tr><td colspan="6" class="text-center text-danger">${error.message}</td></tr>`;
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (!protectPage()) return;
        setHeaders('detalle');
        document.getElementById('applyFiltersBtn').addEventListener('click', loadReport);
        await loadReport();
      });
    </script>
  </body>
</html>
