<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="p-4">
    <div class="page-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Gestión de Usuarios</h2>
          <p class="text-muted mb-0">Control de usuarios y roles</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal"><i class="bi bi-plus-circle"></i> Nuevo usuario</button>
      </div>
      <div class="table-responsive">
        <table class="table align-middle table-hover">
          <thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Acciones</th></tr></thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Usuario</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <form id="userForm">
              <input type="hidden" id="userId" />
              <div class="mb-3"><label class="form-label">Nombre</label><input id="userNombre" class="form-control" required /></div>
              <div class="mb-3"><label class="form-label">Correo</label><input id="userCorreo" type="email" class="form-control" required /></div>
              <div class="mb-3"><label class="form-label">Contraseña</label><input id="userPassword" type="password" class="form-control" /></div>
              <div class="mb-3"><label class="form-label">Rol</label><select id="userRol" class="form-select"><option value="EMPLEADO">EMPLEADO</option><option value="PROPIETARIO">PROPIETARIO</option></select></div>
              <button class="btn btn-primary w-100">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      let users = [];
      async function loadUsers() {
        users = await apiRequest('/api/users');
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = '';
        if (!users.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay usuarios</td></tr>';
          return;
        }
        users.forEach((user) => {
          tbody.innerHTML += `
            <tr>
              <td>${user.nombre}</td>
              <td>${user.correo}</td>
              <td>${user.rol}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-2" onclick="editUser(${user.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${user.id})"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          `;
        });
      }

      async function saveUser(event) {
        event.preventDefault();
        const payload = {
          nombre: document.getElementById('userNombre').value,
          correo: document.getElementById('userCorreo').value,
          rol: document.getElementById('userRol').value,
        };
        if (document.getElementById('userPassword').value) payload.password = document.getElementById('userPassword').value;
        try {
          const id = document.getElementById('userId').value;
          if (id) {
            await apiRequest(`/api/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
          } else {
            await apiRequest('/api/auth/register', { method: 'POST', body: JSON.stringify(payload) });
          }
          bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
          document.getElementById('userForm').reset();
          loadUsers();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      async function deleteUser(id) {
        if (!confirm('¿Eliminar usuario?')) return;
        try {
          await apiRequest(`/api/users/${id}`, { method: 'DELETE' });
          loadUsers();
        } catch (error) {
          showToast(error.message, 'danger');
        }
      }

      function editUser(id) {
        const user = users.find((item) => item.id === id);
        if (!user) return;
        document.getElementById('userId').value = user.id;
        document.getElementById('userNombre').value = user.nombre;
        document.getElementById('userCorreo').value = user.correo;
        document.getElementById('userRol').value = user.rol;
        new bootstrap.Modal(document.getElementById('userModal')).show();
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (!protectPage()) return;
        document.getElementById('userForm').addEventListener('submit', saveUser);
        await loadUsers();
      });
    </script>
  </body>
</html>
